name: Exclusive channel labeling

on:
  pull_request:
    types: [labeled]

jobs:
  exclusive-channel-label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check and remove individual channel labels
        uses: actions/github-script@v7
        env:
          LABEL_NAME: ${{ github.event.label.name }}
        with:
          script: |
            if (process.env.LABEL_NAME !== 'channel: ALL') return;
            const fn = require('./.github/scripts/remove-channel-labels.js');
            await fn({ github, context });
